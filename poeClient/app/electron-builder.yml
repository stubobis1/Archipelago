appId: gg.archipelago.poe-client
productName: PoE Archipelago Client
copyright: Copyright © 2024

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - resources/**/*

extraResources:
  - from: resources/data
    to: data
  - from: resources/sounds
    to: sounds
  - from: ../../pathofexile_ap/pathofexile_ap/images
    to: images

win:
  target: nsis
  icon: build/icon.ico

linux:
  target: AppImage
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
