<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PoE Archipelago Client — Mockups</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .app { border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 0 1px var(--rule-2); overflow: hidden; }
  body { background: #e9e2d2; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens-more.jsx"></script>
<script type="text/babel" src="screen-dashboard.jsx"></script>
<script type="text/babel" src="screen-onboarding.jsx"></script>

<script type="text/babel">
  const App = () => (
    <DesignCanvas
      title="PoE × Archipelago · Client mockups"
      subtitle="Dashboard-first, split-symmetry: commands (left) ↔ multiworld chat (right). Gear is a paper-doll of unlocked rarity tiers. Every /command from the Python client is in Settings."
    >
      <DCSection id="primary" title="Primary run view" subtitle="Split-symmetry dashboard. Commands are real clickable buttons with their last response pinned; chat is the live multiworld feed with inline composer.">
        <DCArtboard id="dashboard" label="Dashboard · split symmetry" width={1200} height={800}>
          <DashboardScreen/>
        </DCArtboard>
      </DCSection>

      <DCSection id="gear" title="Gear · paper-doll" subtitle="Progression state per slot: which rarity tiers are unlocked, which base types per multi-slot, max links. Slots flash red when equipped but no tier is unlocked.">
        <DCArtboard id="gear-paperdoll" label="Gear · paper-doll" width={1200} height={800}>
          <GearScreen/>
        </DCArtboard>
      </DCSection>

      <DCSection id="companion" title="Companion views" subtitle="Everything !gems / !goal / chat would whisper you, rendered properly. Full chat history has search + filter.">
        <DCArtboard id="items" label="Items received · gems + classes + progression" width={1200} height={800}>
          <ItemsScreen/>
        </DCArtboard>
        <DCArtboard id="goal" label="Goal" width={1200} height={800}>
          <GoalScreen/>
        </DCArtboard>
        <DCArtboard id="chat-full" label="Chat · fullscreen" width={1200} height={800}>
          <ChatScreen/>
        </DCArtboard>
      </DCSection>

      <DCSection id="setup" title="Setup" subtitle="First-run wizard replaces the /set_client_text_path → /poe_documents_directory → /poe_auth → /start scavenger hunt.">
        <DCArtboard id="onboarding" label="Onboarding · step 3 of 5" width={1200} height={800}>
          <OnboardingScreen/>
        </DCArtboard>
      </DCSection>

      <DCSection id="config" title="Settings & ambient" subtitle="Every /command from the Python client is exposed as a real control. Tray for long sessions, CLI console for power users.">
        <DCArtboard id="settings" label="Settings · with /command annotations" width={1200} height={800}>
          <SettingsScreen/>
        </DCArtboard>
        <DCArtboard id="tray" label="Tray · minimized run" width={1200} height={800}>
          <TrayScreen/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
